<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Replay</title>
    <link rel="stylesheet" href="/lib/rrweb-player.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        background: #0f0f1e;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #2a2a3e;
      }

      header h1 {
        font-size: 18px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .session-info {
        display: flex;
        gap: 20px;
        font-size: 13px;
        color: #888;
      }

      .info-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .info-label {
        color: #666;
      }

      .info-value {
        color: #aaa;
        font-family: monospace;
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #e63946;
        color: white;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
      }

      .live-dot {
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
      }

      #player-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loading {
        text-align: center;
        color: #888;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: #4950f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        text-align: center;
        color: #ff6b6b;
        max-width: 500px;
      }

      .error h2 {
        font-size: 20px;
        margin-bottom: 0.5rem;
      }

      .error p {
        font-size: 14px;
        line-height: 1.5;
        color: #999;
      }

      .error a {
        color: #4950f6;
        text-decoration: none;
      }

      .error a:hover {
        text-decoration: underline;
      }

      /* Custom events sidebar */
      .events-sidebar {
        position: fixed;
        right: 0;
        top: 60px;
        bottom: 0;
        width: 300px;
        background: #0f0f1e;
        border-left: 1px solid #2a2a3e;
        padding: 1rem;
        overflow-y: auto;
        display: none;
      }

      .events-sidebar.has-events {
        display: block;
      }

      .events-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .event-item {
        background: #1a1a2e;
        border-radius: 6px;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        border-left: 3px solid #4950f6;
        cursor: pointer;
        transition: background 0.15s;
      }

      .event-item:hover {
        background: #2a2a3e;
      }

      .event-tag {
        font-size: 13px;
        font-weight: 600;
        color: white;
        margin-bottom: 0.25rem;
      }

      .event-time {
        font-size: 11px;
        color: #666;
        font-family: monospace;
      }

      .event-payload {
        font-size: 11px;
        color: #888;
        margin-top: 0.5rem;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        <span>Session Replay</span>
        <span id="live-indicator" style="display: none" class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </span>
      </h1>
      <div class="session-info">
        <div class="info-item">
          <span class="info-label">Session:</span>
          <span class="info-value" id="session-id">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Events:</span>
          <span class="info-value" id="event-count">—</span>
        </div>
      </div>
    </header>

    <main>
      <div id="player-container">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Loading session...</p>
        </div>
      </div>
    </main>

    <div class="events-sidebar" id="events-sidebar">
      <div class="events-title">Custom Events</div>
      <div id="events-list"></div>
    </div>

    <script type="module">
      import rrwebPlayer from "/lib/rrweb-player.min.js";

      const PlayerCtor = rrwebPlayer;

      // Parse URL params
      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session");
      const isLive = params.get("live") === "true";

      if (!sessionId) {
        showError(
          "No session ID provided",
          "Please select a session from the dashboard.",
        );
      } else {
        document.getElementById("session-id").textContent =
          sessionId.slice(0, 8) + "…";
        if (isLive) {
          document.getElementById("live-indicator").style.display = "flex";
          loadLiveSession();
        } else {
          loadRecordedSession();
        }
      }

      // ─── Load recorded session ─────────────────────────────────────────────
      async function loadRecordedSession() {
        try {
          const res = await fetch(`/api/sessions/${sessionId}/events`);
          if (!res.ok) throw new Error("Session not found");

          const { events } = await res.json();

          if (events.length === 0) {
            showError(
              "No events found",
              "This session has no recorded events yet.",
            );
            return;
          }

          renderPlayer(events);
          extractCustomEvents(events);

          document.getElementById("event-count").textContent =
            events.length.toLocaleString();
        } catch (err) {
          showError("Failed to load session", err.message);
        }
      }

      // ─── Load live session via WebSocket ───────────────────────────────────
      function loadLiveSession() {
        const ws = new WebSocket(
          `${location.origin.replace("http", "ws")}/live?session=${sessionId}&role=viewer`,
        );

        let allEvents = [];

        ws.onopen = () => {
          console.log("[Live] Connected to session");
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);

          if (msg.type === "catchup") {
            // Initial events from DB
            allEvents = msg.events;
            if (allEvents.length > 0) {
              renderPlayer(allEvents);
              extractCustomEvents(allEvents);
            }
          } else if (msg.type === "events") {
            // New events streaming in
            allEvents.push(...msg.events);

            // Add to existing replayer
            if (window.replayer) {
              msg.events.forEach((event) => {
                window.replayer.addEvent(event);
              });
            } else {
              renderPlayer(allEvents);
            }

            extractCustomEvents(msg.events);
          }

          document.getElementById("event-count").textContent =
            allEvents.length.toLocaleString();
        };

        ws.onerror = (err) => {
          showError("WebSocket error", "Could not connect to live session.");
        };

        ws.onclose = () => {
          console.log("[Live] Connection closed");
        };
      }

      // ─── Render the rrweb player ───────────────────────────────────────────
      function renderPlayer(events) {
        const container = document.getElementById("player-container");
        container.innerHTML = "";

        window.replayer = new PlayerCtor({
          target: container,
          props: {
            events,
            width: 1024,
            height: 768,
            autoPlay: true,
            showController: true,
            skipInactive: false,
            speed: 1,
            mouseTail: {
              duration: 500,
              strokeStyle: "#4950f6",
            },
          },
        });
      }

      // ─── Extract custom events (type 5) ────────────────────────────────────
      function extractCustomEvents(events) {
        const customEvents = events.filter((e) => e.type === 5);

        if (customEvents.length === 0) return;

        const sidebar = document.getElementById("events-sidebar");
        const list = document.getElementById("events-list");

        sidebar.classList.add("has-events");

        customEvents.forEach((event) => {
          const item = document.createElement("div");
          item.className = "event-item";

          const tag = document.createElement("div");
          tag.className = "event-tag";
          tag.textContent = event.data.tag || "custom_event";

          const time = document.createElement("div");
          time.className = "event-time";
          time.textContent = new Date(event.timestamp).toLocaleTimeString();

          item.appendChild(tag);
          item.appendChild(time);

          if (
            event.data.payload &&
            Object.keys(event.data.payload).length > 0
          ) {
            const payload = document.createElement("div");
            payload.className = "event-payload";
            payload.textContent = JSON.stringify(event.data.payload, null, 2);
            item.appendChild(payload);
          }

          // Click to jump to this event's timestamp
          item.onclick = () => {
            if (window.replayer) {
              window.replayer.goto(event.timestamp);
            }
          };

          list.appendChild(item);
        });
      }

      // ─── Error display ─────────────────────────────────────────────────────
      function showError(title, message) {
        const container = document.getElementById("player-container");
        container.innerHTML = `
      <div class="error">
        <h2>${title}</h2>
        <p>${message}</p>
        <p style="margin-top: 1rem;">
          <a href="/dashboard/">← Back to dashboard</a>
        </p>
      </div>
    `;
      }
    </script>
  </body>
</html>
